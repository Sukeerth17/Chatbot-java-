server:
  port: 0

spring:
  datasource:
    url: jdbc:h2:mem:chatbot_test;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false
  kafka:
    bootstrap-servers: ${spring.embedded.kafka.brokers:localhost:9092}
    consumer:
      group-id: chatbot-consumer-group-test
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: in.technobuild.chatbot.kafka.model
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
  data:
    redis:
      host: localhost
      port: 6379

security:
  jwt:
    secret: test-jwt-secret-test-jwt-secret-test-jwt-secret-123456

app:
  datasource:
    business:
      url: jdbc:h2:mem:business_test;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
      username: sa
      password:
      driver-class-name: org.h2.Driver

kafka:
  topics:
    chat-requests: chat.requests
    sql-requests: sql.requests
    chat-responses: chat.responses
    doc-ingestion: document.ingestion
    model-health: model.health.events

chatbot:
  sql:
    allowed-tables:
      - ctm
      - inventorymulti2
  ollama:
    base-url: http://localhost:11434
    chat-model: llama3.1:8b-instruct-q4_K_M
  python:
    base-url: http://localhost:8000

logging:
  level:
    root: WARN
