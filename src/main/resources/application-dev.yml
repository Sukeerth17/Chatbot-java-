spring:
  datasource:
    url: ${CHATBOT_DB_URL:jdbc:postgresql://localhost:5432/chatbot_db}
    username: ${CHATBOT_DB_USER:chatbot_user}
    password: ${CHATBOT_DB_PASS:localdevpassword}
  flyway:
    enabled: true
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

management:
  endpoint:
    health:
      show-details: always

security:
  jwt:
    secret: ${JWT_SECRET:dev-secret-change-me-please-32-chars-minimum}

logging:
  level:
    in.technobuild: DEBUG
    org.springframework.kafka: INFO
    org.hibernate.SQL: DEBUG

chatbot:
  rate-limit:
    requests-per-minute: 100
    daily-token-limit: 999999
  cache:
    enabled: false
  ollama:
    base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
  python:
    base-url: ${PYTHON_AI_BASE_URL:http://localhost:8000}
